name: Deploy Edge Function
on:
  push:
    branches: [ main, master ] # Triggers on either main or master branch
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - run: supabase functions deploy razorpay-create-order --project-ref uzzohcfnygvghxjjxujy --no-verify-jwt
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
